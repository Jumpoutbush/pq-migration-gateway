services:
  bank-backend:
    image: python:3.12-slim
    container_name: bank-backend
    working_dir: /app
    command: ["python", "/app/bank_backend.py", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - ./backend:/app:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  pq-gateway:
    image: pq-migration-gateway-pq-gateway:2.0
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
      network: host
      args:
        OPENSSL_VERSION: "3.5.0"
        NGINX_VERSION: "1.28.0"
        MAKE_JOBS: "4"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        http_proxy: "${HTTP_PROXY:-}"
        https_proxy: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,::1}"
        no_proxy: "${no_proxy:-localhost,127.0.0.1,::1}"
    container_name: pq-gateway
    depends_on:
      bank-backend:
        condition: service_healthy
    ports:
      - "8443:8443"
      - "9443:9443"
    environment:
      SERVICES_CONFIG: "/etc/pq-gateway/config/services.json"
    volumes:
      - ./certs:/etc/pq-gateway/certs:ro
      - ./config:/etc/pq-gateway/config:ro
      - ./scripts:/workspace/scripts:ro
      - ./scanner:/workspace/scanner:ro
      - ./manager:/workspace/manager:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --noproxy '*' -fsS --resolve bank-gateway.local:8443:127.0.0.1 --cacert /etc/pq-gateway/certs/ca.crt https://bank-gateway.local:8443/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
