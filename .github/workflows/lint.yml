name: lint

on:
  push:
  pull_request:

jobs:
  syntax-and-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python syntax check
        run: |
          find backend scripts scanner manager tests -name '*.py' -print0 | xargs -0 python -m py_compile
      - name: Shell syntax check
        run: |
          bash -n certs/*.sh scripts/run_full_experiment.sh
          sh -n gateway/entrypoint.sh
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Render configuration
        run: python scripts/render_gateway_config.py --config config/services.json --output /tmp/nginx.conf --check
